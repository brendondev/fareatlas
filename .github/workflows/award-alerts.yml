name: Award Alerts Cron

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:        # manual trigger via GitHub UI

jobs:
  run-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger award-alerts
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "Target: ${APP_URL}/api/cron/award-alerts"
          BODY=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            --get \
            --data-urlencode "secret=${CRON_SECRET}" \
            "${APP_URL}/api/cron/award-alerts")
          STATUS=$(echo "$BODY" | grep "HTTP_STATUS:" | cut -d: -f2)
          JSON=$(echo "$BODY" | grep -v "HTTP_STATUS:")
          echo "HTTP ${STATUS}"
          echo "Response: ${JSON}"
          if [ "${STATUS}" -lt 200 ] || [ "${STATUS}" -ge 300 ]; then
            echo "Cron returned HTTP ${STATUS} - failing job"
            exit 1
          fi
